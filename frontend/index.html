<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/contextos-mark.svg" />
    <link rel="shortcut icon" href="/contextos-mark.svg" />
    <link rel="mask-icon" href="/contextos-pinned-tab.svg" color="#8250f2" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContextOS | Private AI Workspace for Team Knowledge</title>
    <meta
      name="description"
      content="ContextOS is a private AI workspace for company knowledge, local inference, onboarding memory, and DPDP-aware team search."
    />
    <meta name="theme-color" content="#0f172a" />
    <meta property="og:title" content="ContextOS | Private AI Workspace for Team Knowledge" />
    <meta
      property="og:description"
      content="Search, manage, and operationalize company knowledge with local AI, private memory, and compliance-aware workflows."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (localTheme === 'dark' || (!localTheme && sysTheme)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
